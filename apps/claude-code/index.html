<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 对话管理器</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --panel-2: #fafbfc;
    --border: #e5e7eb;
    --border-strong: #d7dbe0;
    --text: #15171c;
    --muted: #6b7280;
    --muted-2: #9aa1ab;
    --accent: #c2410c;          /* Claude 珊瑚橙 */
    --accent-soft: #fde9df;
    --archive: #b45309;
    --archive-soft: #fef3c7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --green: #047857;
    --green-soft: #d1fae5;
    --blue: #1d4ed8;
    --blue-soft: #dbeafe;
    --purple: #6d28d9;
    --purple-soft: #ede9fe;
    --teal: #0f766e;
    --teal-soft: #ccfbf1;
    --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
    --shadow-1: 0 1px 2px rgba(16,24,40,.05);
    --shadow-2: 0 4px 14px rgba(16,24,40,.07), 0 1px 3px rgba(16,24,40,.05);
    --shadow-3: 0 16px 40px rgba(16,24,40,.16), 0 4px 12px rgba(16,24,40,.08);
    --ease: cubic-bezier(.22,.8,.28,1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d0e12;
      --panel: #181b21;
      --panel-2: #1e2129;
      --border: #2a2f37;
      --border-strong: #383e48;
      --text: #e6e8eb;
      --muted: #9aa3af;
      --muted-2: #6b7280;
      --accent: #e8895d;
      --accent-soft: #3a241a;
      --archive: #fbbf24;
      --archive-soft: #3a2d10;
      --danger: #f87171;
      --danger-soft: #3a1718;
      --green: #34d399;
      --green-soft: #12352a;
      --blue: #93c5fd;
      --blue-soft: #1e2a4a;
      --purple: #c4b5fd;
      --purple-soft: #2b2145;
      --teal: #5eead4;
      --teal-soft: #113a36;
      --shadow-1: 0 1px 2px rgba(0,0,0,.3);
      --shadow-2: 0 4px 14px rgba(0,0,0,.35);
      --shadow-3: 0 20px 44px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  html { color-scheme: light dark; }
  body {
    margin: 0; color: var(--text); -webkit-font-smoothing: antialiased;
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(1100px 480px at 50% -14%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }
  ::selection { background: var(--accent); color: #fff; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--panel) 88%, transparent);
    backdrop-filter: saturate(180%) blur(14px); -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px 16px;
  }
  .titlebar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brandmark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 9px; font-size: 15px;
    background: linear-gradient(145deg, var(--accent-soft), var(--panel-2));
    border: 1px solid var(--border); box-shadow: var(--shadow-1);
  }
  h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  h1 .tvariant { font-weight: 500; color: var(--muted); margin-left: 2px; }
  .home { font-size: 11.5px; color: var(--muted-2); font-family: ui-monospace, Menlo, monospace; }
  .spacer { flex: 1; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  input[type=search] {
    flex: 1; min-width: 200px; padding: 9px 14px 9px 34px; border-radius: var(--r-sm);
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text); font-size: 13.5px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='%239aa1ab' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-position: 12px center;
    transition: border-color .15s var(--ease), box-shadow .15s var(--ease), background-color .15s var(--ease);
  }
  input[type=search]:focus {
    outline: none; border-color: var(--accent); background: var(--panel);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  select.proj {
    padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 12.5px; max-width: 280px;
  }
  .filters { display: inline-flex; border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; background: var(--panel); }
  .filters button {
    border: 0; background: transparent; color: var(--muted);
    padding: 8px 14px; cursor: pointer; font-size: 12.5px; border-right: 1px solid var(--border);
    transition: background .15s var(--ease), color .15s var(--ease);
  }
  .filters button:last-child { border-right: 0; }
  .filters button:hover { color: var(--text); background: var(--panel-2); }
  .filters button.active { background: var(--accent); color: #fff; font-weight: 600; }
  button.ghost {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 7px 14px; border-radius: var(--r-sm); cursor: pointer; font-size: 13px;
    transition: border-color .15s var(--ease), color .15s var(--ease), background .15s var(--ease);
  }
  button.ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  button.ghost:active { transform: scale(.96); }
  .spin { display: inline-block; transition: transform .5s var(--ease); }
  button.ghost:hover .spin { transform: rotate(180deg); }
  main { max-width: 1080px; margin: 20px auto; padding: 0 24px 70px; }
  .stat { color: var(--muted); font-size: 12.5px; margin-bottom: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-left: 3px solid transparent;
    border-radius: var(--r-lg); padding: 15px 17px; margin-bottom: 11px; box-shadow: var(--shadow-1);
    display: grid; grid-template-columns: 1fr auto; gap: 8px 16px; align-items: start;
    transition: transform .16s var(--ease), box-shadow .16s var(--ease), border-color .16s var(--ease);
  }
  .card:hover { transform: translateY(-1px); box-shadow: var(--shadow-2); border-color: var(--border-strong); }
  .card:has(.badge.arch) { border-left-color: var(--archive); }
  .card:has(.badge.local) { border-left-color: var(--green); }
  .card .main { min-width: 0; }
  .row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ttl { font-size: 14.5px; font-weight: 650; letter-spacing: -.005em; }
  .badge {
    display: inline-flex; align-items: center;
    font-size: 10.5px; padding: 3px 9px; border-radius: 999px; font-weight: 650; letter-spacing: .1px; white-space: nowrap;
  }
  .badge.local { background: var(--green-soft); color: var(--green); }
  .badge.arch  { background: var(--archive-soft); color: var(--archive); }
  .badge.src-both    { background: var(--teal-soft);   color: var(--teal); }
  .badge.src-local   { background: var(--blue-soft);   color: var(--blue); }
  .badge.src-desktop { background: var(--purple-soft); color: var(--purple); }
  .actions .ro { color: var(--muted); font-size: 11.5px; text-align: center; padding: 6px 4px; line-height: 1.4; }
  .badge.src   { background: var(--accent-soft); color: var(--accent); }
  .badge.ai    { background: var(--accent-soft); color: var(--accent); }
  .meta { color: var(--muted); font-size: 11.5px; margin-top: 6px; display: flex; gap: 13px; flex-wrap: wrap; }
  .meta .cwd { font-family: ui-monospace, Menlo, monospace; }
  .preview {
    margin-top: 9px; color: var(--text); font-size: 12.5px; opacity: .78; line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .actions { display: flex; flex-direction: column; gap: 7px; align-items: stretch; }
  .actions button {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 6px 14px; border-radius: var(--r-sm); cursor: pointer; font-size: 12.5px; white-space: nowrap; min-width: 96px;
    transition: border-color .15s var(--ease), color .15s var(--ease), background .15s var(--ease), transform .1s var(--ease);
  }
  .actions button:active { transform: scale(.96); }
  .actions button.archive:hover  { border-color: var(--archive); color: var(--archive); background: var(--archive-soft); }
  .actions button.unarch:hover   { border-color: var(--green);   color: var(--green);   background: var(--green-soft); }
  .actions button.danger:hover   { border-color: var(--danger);  color: var(--danger);  background: var(--danger-soft); }
  /* 多选 */
  .selall { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); cursor: pointer; user-select: none; white-space: nowrap; }
  input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; margin: 0; }
  .card.picked { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-2); }
  .card .pick { align-self: center; }
  #batchbar {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px);
    display: flex; align-items: center; gap: 10px; z-index: 40;
    background: color-mix(in srgb, var(--panel) 92%, transparent);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: var(--r-md);
    padding: 10px 14px; box-shadow: var(--shadow-3);
    opacity: 0; pointer-events: none; transition: opacity .2s var(--ease), transform .2s var(--ease); max-width: 92vw; flex-wrap: wrap;
  }
  #batchbar.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  #batch-count { font-weight: 650; font-size: 12.5px; }
  .bb { border: 1px solid var(--border); background: var(--panel); color: var(--text); padding: 7px 14px; border-radius: var(--r-sm); cursor: pointer; font-size: 12.5px; white-space: nowrap; transition: border-color .15s var(--ease), color .15s var(--ease), background .15s var(--ease); }
  .bb:active { transform: scale(.96); }
  .bb.archive:hover { border-color: var(--archive); color: var(--archive); background: var(--archive-soft); }
  .bb.unarch:hover  { border-color: var(--green);   color: var(--green);   background: var(--green-soft); }
  .bb.danger:hover  { border-color: var(--danger);  color: var(--danger);  background: var(--danger-soft); }
  .bb.ghost { color: var(--muted); }
  .empty, .loading {
    text-align: center; color: var(--muted); padding: 90px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 13px;
  }
  .loading::before { content: "⏳"; font-size: 30px; animation: pulse 1.5s ease-in-out infinite; }
  .empty::before { content: "🗂️"; font-size: 38px; opacity: .55; }
  @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: .9; } }
  #banner {
    display: none; margin-top: 12px; padding: 10px 14px; border-radius: var(--r-sm);
    background: var(--archive-soft); color: var(--archive); font-size: 12.5px;
    border: 1px solid color-mix(in srgb, var(--archive) 40%, transparent); line-height: 1.55;
  }
  #banner.show { display: block; }
  #banner b { font-weight: 700; }
  .id { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--muted-2); }
  /* toast */
  #toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(6px);
    background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 10px;
    font-size: 12.5px; box-shadow: var(--shadow-3); opacity: 0; pointer-events: none;
    transition: opacity .25s var(--ease), transform .25s var(--ease); max-width: 80vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.err { background: var(--danger); color: #fff; }
  /* modal */
  #overlay {
    position: fixed; inset: 0; background: rgba(10,10,14,.5); display: none;
    align-items: center; justify-content: center; z-index: 50;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  #overlay.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 22px; max-width: 420px; width: 90%; box-shadow: var(--shadow-3);
    animation: pop .16s var(--ease);
  }
  @keyframes pop { from { opacity: 0; transform: scale(.96) translateY(4px); } to { opacity: 1; transform: none; } }
  .modal h3 { margin: 0 0 8px; font-size: 15.5px; }
  .modal p { color: var(--muted); margin: 0 0 18px; font-size: 12.5px; line-height: 1.6; }
  .modal .mttl { color: var(--text); font-weight: 650; }
  .modal .btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal button { padding: 8px 16px; border-radius: var(--r-sm); cursor: pointer; font-size: 14px; border: 1px solid var(--border); background: var(--panel); color: var(--text); transition: background .15s var(--ease); }
  .modal button:hover { background: var(--panel-2); }
  .modal button.confirm { background: var(--danger); color: #fff; border-color: var(--danger); font-weight: 600; }
  .modal button.confirm:hover { background: color-mix(in srgb, var(--danger) 85%, black); }
  code { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
</style>
</head>
<body>
<header>
  <div class="titlebar">
    <div class="brand">
      <span class="brandmark">✳️</span>
      <h1>Claude Code<span class="tvariant" data-i18n="appTitleSuffix">对话管理器</span></h1>
    </div>
    <span class="home" id="home"></span>
    <span class="spacer"></span>
    <button class="ghost" id="refresh"><span class="spin">↻</span> <span data-i18n="refresh">刷新</span></button>
  </div>
  <div class="toolbar">
    <input type="search" id="q" data-i18n-placeholder="searchPlaceholder" placeholder="搜索标题 / 目录(cwd) / 预览内容 …" autocomplete="off">
    <select class="proj" id="proj"><option value="" data-i18n="allProjects">全部工程</option></select>
    <div class="filters" id="filters">
      <button data-f="all" class="active" data-i18n="filterAll">全部</button>
      <button data-f="local" data-i18n="filterLocal">本地</button>
      <button data-f="archived" data-i18n="filterArchived">归档</button>
    </div>
    <div class="filters" id="srcfilters" data-i18n-title="srcFilterTitle" title="按来源筛选：会话存在于桌面端 App、本地文件，还是两边都有">
      <button data-sf="all" class="active" data-i18n="srcAll">全部来源</button>
      <button data-sf="both" data-i18n="srcBoth">都有</button>
      <button data-sf="local" data-i18n="srcOnlyLocal">仅本地</button>
      <button data-sf="desktop" data-i18n="srcOnlyDesktop">仅桌面端</button>
    </div>
    <label class="selall"><input type="checkbox" id="selall"> <span data-i18n="selectAllVisible">全选当前</span></label>
  </div>
  <div id="banner" data-i18n-html="bannerRunning">
    ⚠️ <b>检测到 Claude Code 正在运行。</b>
    若你正在某个会话里对话，请避免对<b>当前活跃的那条会话</b>做归档/删除，以免文件被进程改写时发生冲突。其余会话不受影响。
  </div>
</header>

<main>
  <div class="stat" id="stat"></div>
  <div id="list"><div class="loading" data-i18n="loading">加载中…</div></div>
</main>

<div id="batchbar">
  <span id="batch-count"></span>
  <button class="bb archive" data-bact="archive" data-i18n="btnArchive">📦 归档</button>
  <button class="bb unarch" data-bact="unarchive" data-i18n="btnUnarchive">↩︎ 取消归档</button>
  <button class="bb danger" data-bact="delete" data-i18n="btnDelete">🗑 删除</button>
  <button class="bb ghost" id="batch-clear" data-i18n="clearSelection">清除</button>
</div>

<div id="toast"></div>

<div id="overlay">
  <div class="modal">
    <h3 id="m-title" data-i18n="confirmTitle">确认</h3>
    <p id="m-body"></p>
    <div class="btns">
      <button id="m-cancel" data-i18n="cancel">取消</button>
      <button id="m-ok" class="confirm" data-i18n="ok">确定</button>
    </div>
  </div>
</div>

<script>
const LANG = (() => {
  const qs = new URLSearchParams(location.search).get("lang");
  if (qs === "zh" || qs === "en") return qs;
  return ((navigator.language || "en").toLowerCase().startsWith("zh")) ? "zh" : "en";
})();
document.documentElement.lang = LANG === "zh" ? "zh-CN" : "en";

const T = {
  zh: {
    appTitle: "Claude Code 对话管理器",
    appTitleSuffix: "对话管理器",
    refresh: "刷新",
    searchPlaceholder: "搜索标题 / 目录(cwd) / 预览内容 …",
    allProjects: "全部工程",
    filterAll: "全部", filterLocal: "本地", filterArchived: "归档",
    srcFilterTitle: "按来源筛选：会话存在于桌面端 App、本地文件，还是两边都有",
    srcAll: "全部来源", srcBoth: "都有", srcOnlyLocal: "仅本地", srcOnlyDesktop: "仅桌面端",
    selectAllVisible: "全选当前",
    bannerRunning: '⚠️ <b>检测到 Claude Code 正在运行。</b> 若你正在某个会话里对话，请避免对<b>当前活跃的那条会话</b>做归档/删除，以免文件被进程改写时发生冲突。其余会话不受影响。',
    loading: "加载中…",
    clearSelection: "清除",
    confirmTitle: "确认", cancel: "取消", ok: "确定",
    loadFailed: (msg) => `加载失败：${msg}`,
    syncCleaned: (n) => `已自动清理 ${n} 条本地多余会话（已备份，可找回）`,
    stat: (total, local, arch, both, onlyLocal, onlyDesk, shown) =>
      `共 ${total} 条　·　本地 ${local}　·　归档 ${arch}　·　来源：都有 ${both} / 仅本地 ${onlyLocal} / 仅桌面端 ${onlyDesk}　·　当前显示 ${shown}`,
    noMatch: "没有匹配的对话。",
    badgeArchived: "已归档", badgeLocal: "本地",
    srcBadgeBoth: { label: "桌面+本地", title: "桌面端 App 里有登记，本地也有会话文件，两边都能看到" },
    srcBadgeLocal: { label: "仅本地", title: "只有本地会话文件（终端会话，或桌面端已不再登记），桌面端 App 里看不到" },
    srcBadgeDesktop: { label: "仅桌面端", title: "只在桌面端 App 里登记，本地会话文件已不存在，此工具只读展示" },
    customTitleBadge: "自定义标题", aiTitleBadge: "AI 标题",
    turns: (u, a) => `💬 ${u}/${a} 轮`, turnsDesktopOnly: (u) => `💬 ${u} 轮`,
    readOnlyNote: "本地无文件<br>仅可在桌面端<br>App 里操作",
    btnUnarchive: "↩︎ 取消归档", btnArchive: "📦 归档", btnDelete: "🗑 删除",
    deleteTitle: "删除这条对话？",
    deleteBody: (title, warn) => `将删除 <span class="mttl">「${title}」</span> 并从列表移除。<br><br>删除前会自动备份到 <code>~/.claude/deleted_sessions/</code>（可手动找回），并不是彻底抹除。${warn}`,
    deleteRunWarn: '<br><br>⚠️ <b>Claude Code 正在运行</b>：如果这正是你当前打开的会话，请先退出再删除，避免冲突。',
    actionLabels: { archive: "归档", unarchive: "取消归档", delete: "删除" },
    actionDone: (label, title) => `已${label}：${title}`,
    actionFailed: (label, msg) => `${label}失败：${msg}`,
    unknownError: "未知错误",
    selectedCount: (n) => `已选 ${n} 项`,
    batchDeleteTitle: (n) => `删除选中的 ${n} 条对话？`,
    batchDeleteBody: (n, warn) => `将删除选中的 <span class="mttl">${n} 条</span>会话并从列表移除。<br><br>删除前都会自动备份到 <code>~/.claude/deleted_sessions/</code>（可手动找回）。${warn}`,
    batchRunWarn: '<br><br>⚠️ <b>Claude Code 正在运行</b>：若选中项里有当前打开的会话，请先退出再删除。',
    batchDone: (label, n) => `已${label} ${n} 条`,
    batchPartial: (label, ok, fail) => `${label}：成功 ${ok}，失败 ${fail}`,
    errCodes: {
      bad_request: "请求体解析失败", unknown_action: "未知操作", invalid_id: "没有合法的会话 id",
      file_not_found: "找不到该会话文件",
    },
  },
  en: {
    appTitle: "Claude Code Session Manager",
    appTitleSuffix: "Session Manager",
    refresh: "Refresh",
    searchPlaceholder: "Search title / directory (cwd) / preview …",
    allProjects: "All projects",
    filterAll: "All", filterLocal: "Local", filterArchived: "Archived",
    srcFilterTitle: "Filter by source: is the session in the desktop app, a local file, or both",
    srcAll: "All sources", srcBoth: "Both", srcOnlyLocal: "Local only", srcOnlyDesktop: "Desktop only",
    selectAllVisible: "Select all visible",
    bannerRunning: '⚠️ <b>Claude Code is running.</b> If you\'re currently chatting in a session, avoid archiving/deleting <b>the one that\'s active</b> — the file could get overwritten mid-write. Other sessions are unaffected.',
    loading: "Loading…",
    clearSelection: "Clear",
    confirmTitle: "Confirm", cancel: "Cancel", ok: "OK",
    loadFailed: (msg) => `Failed to load: ${msg}`,
    syncCleaned: (n) => `Auto-cleaned ${n} orphaned local session(s) (backed up, recoverable)`,
    stat: (total, local, arch, both, onlyLocal, onlyDesk, shown) =>
      `${total} total　·　${local} local　·　${arch} archived　·　sources: ${both} both / ${onlyLocal} local-only / ${onlyDesk} desktop-only　·　${shown} shown`,
    noMatch: "No matching conversations.",
    badgeArchived: "Archived", badgeLocal: "Local",
    srcBadgeBoth: { label: "Desktop+Local", title: "Registered in the desktop app and has a local session file — visible on both sides" },
    srcBadgeLocal: { label: "Local only", title: "Only a local session file exists (CLI session, or no longer registered in desktop) — not visible in the desktop app" },
    srcBadgeDesktop: { label: "Desktop only", title: "Only registered in the desktop app; the local session file no longer exists — read-only here" },
    customTitleBadge: "Custom title", aiTitleBadge: "AI title",
    turns: (u, a) => `💬 ${u}/${a} turns`, turnsDesktopOnly: (u) => `💬 ${u} turns`,
    readOnlyNote: "No local file<br>Desktop app<br>only",
    btnUnarchive: "↩︎ Unarchive", btnArchive: "📦 Archive", btnDelete: "🗑 Delete",
    deleteTitle: "Delete this conversation?",
    deleteBody: (title, warn) => `This will delete <span class="mttl">"${title}"</span> and remove it from the list.<br><br>It's backed up to <code>~/.claude/deleted_sessions/</code> first (recoverable by hand) — not a permanent wipe.${warn}`,
    deleteRunWarn: '<br><br>⚠️ <b>Claude Code is running</b>: if this is the session you currently have open, quit it first to avoid a conflict.',
    actionLabels: { archive: "Archive", unarchive: "Unarchive", delete: "Delete" },
    actionDone: (label, title) => `${label}d: ${title}`,
    actionFailed: (label, msg) => `${label} failed: ${msg}`,
    unknownError: "Unknown error",
    selectedCount: (n) => `${n} selected`,
    batchDeleteTitle: (n) => `Delete the ${n} selected conversations?`,
    batchDeleteBody: (n, warn) => `This will delete the <span class="mttl">${n}</span> selected conversations and remove them from the list.<br><br>Each is backed up to <code>~/.claude/deleted_sessions/</code> first (recoverable by hand).${warn}`,
    batchRunWarn: '<br><br>⚠️ <b>Claude Code is running</b>: if the current session is among those selected, quit it first before deleting.',
    batchDone: (label, n) => `${label}d ${n}`,
    batchPartial: (label, ok, fail) => `${label}: ${ok} succeeded, ${fail} failed`,

      file_not_found: "Session file not found",

};
const t = T[LANG];

function applyStaticI18n() {
  document.title = t.appTitle;
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
    const key = el.dataset.i18nPlaceholder;
    if (t[key] !== undefined) el.placeholder = t[key];
  });
  document.querySelectorAll("[data-i18n-title]").forEach((el) => {
    const key = el.dataset.i18nTitle;
    if (t[key] !== undefined) el.title = t[key];
  });
  document.querySelectorAll("[data-i18n-html]").forEach((el) => {
    const key = el.dataset.i18nHtml;
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  $("#batch-count").textContent = t.selectedCount(0);
}

let ALL = [];
let filter = "all";
let srcFilter = "all";
let query = "";
let projFilter = "";
let RUNNING = false;
let selected = new Set();

const $ = (s) => document.querySelector(s);
applyStaticI18n();

function fmtDate(s, mtime) {
  let d = s ? new Date(s) : (mtime ? new Date(mtime * 1000) : null);
  if (!d || isNaN(d)) return "—";
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtSize(b) {
  if (!b) return "0 B";
  const u = ["B","KB","MB","GB"]; let i = 0;
  while (b >= 1024 && i < u.length-1) { b /= 1024; i++; }
  return `${b.toFixed(b < 10 && i > 0 ? 1 : 0)} ${u[i]}`;
}
function esc(s) {
  return (s ?? "").replace(/[&<>"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}
function shortCwd(p) {
  if (!p) return "—";
  return p.replace(/^\/Users\/[^/]+/, "~");
}
function errText(data) {
  const code = data && data.error_code;
  if (code && t.errCodes[code]) return t.errCodes[code];
  return (data && data.error) || t.unknownError;
}

function toast(msg, isErr) {
  const el = $("#toast");
  el.textContent = msg;
  el.className = "show" + (isErr ? " err" : "");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => (el.className = ""), 2600);
}

async function load() {
  $("#list").innerHTML = `<div class="loading">${t.loading}</div>`;
  try {
    const r = await fetch("/api/sessions");
    const data = await r.json();
    if (!data.ok) throw new Error(errText(data));
    ALL = data.sessions || [];
    RUNNING = !!data.claude_running;
    $("#home").textContent = data.claude_home || "";
    $("#banner").classList.toggle("show", RUNNING);
    if (data.sync && data.sync.backed_up > 0) {
      toast(t.syncCleaned(data.sync.backed_up));
    }
    fillProjects();
    render();
  } catch (e) {
    $("#list").innerHTML = `<div class="empty">${t.loadFailed(esc(e.message))}</div>`;
  }
}

function fillProjects() {
  const sel = $("#proj");
  const cur = projFilter;
  const cwds = [...new Set(ALL.map((s) => s.cwd).filter(Boolean))].sort();
  sel.innerHTML = `<option value="">${t.allProjects}</option>` +
    cwds.map((c) => `<option value="${esc(c)}">${esc(shortCwd(c))}</option>`).join("");
  sel.value = cwds.includes(cur) ? cur : "";
  projFilter = sel.value;
}

function filtered() {
  const q = query.trim().toLowerCase();
  return ALL.filter((s) => {
    if (filter === "local" && s.archived) return false;
    if (filter === "archived" && !s.archived) return false;
    if (srcFilter !== "all" && s.source !== srcFilter) return false;
    if (projFilter && s.cwd !== projFilter) return false;
    if (!q) return true;
    return (s.title + " " + s.cwd + " " + s.preview + " " + s.id).toLowerCase().includes(q);
  });
}

function render() {
  const items = filtered();

  const nLocal = ALL.filter((s) => !s.archived).length;
  const nArch = ALL.filter((s) => s.archived).length;
  const nBoth = ALL.filter((s) => s.source === "both").length;
  const nOnlyLocal = ALL.filter((s) => s.source === "local").length;
  const nOnlyDesk = ALL.filter((s) => s.source === "desktop").length;
  $("#stat").textContent = t.stat(ALL.length, nLocal, nArch, nBoth, nOnlyLocal, nOnlyDesk, items.length);

  if (!items.length) {
    $("#list").innerHTML = `<div class="empty">${t.noMatch}</div>`;
  } else {
    $("#list").innerHTML = items.map(cardHTML).join("");
    document.querySelectorAll("[data-act]").forEach((btn) => {
      btn.addEventListener("click", () => onAction(btn.dataset.act, btn.dataset.id));
    });
    document.querySelectorAll("input.pick").forEach((cb) => {
      cb.addEventListener("change", () => toggleOne(cb.dataset.id, cb.checked));
    });
  }
  syncSelectionUI();
}

function cardHTML(s) {
  const badge = s.archived
    ? `<span class="badge arch">${t.badgeArchived}</span>`
    : `<span class="badge local">${t.badgeLocal}</span>`;
  const srcBadge = {
    both:    `<span class="badge src-both" title="${esc(t.srcBadgeBoth.title)}">${t.srcBadgeBoth.label}</span>`,
    local:   `<span class="badge src-local" title="${esc(t.srcBadgeLocal.title)}">${t.srcBadgeLocal.label}</span>`,
    desktop: `<span class="badge src-desktop" title="${esc(t.srcBadgeDesktop.title)}">${t.srcBadgeDesktop.label}</span>`,
  }[s.source] || "";
  const titleKind = s.custom_title
    ? `<span class="badge src">${t.customTitleBadge}</span>`
    : (s.ai_title ? `<span class="badge ai">${t.aiTitleBadge}</span>` : "");
  const turns = s.source === "desktop" ? t.turnsDesktopOnly(s.user_turns) : t.turns(s.user_turns, s.assistant_turns);
  const branch = s.git_branch ? `<span>🌿 ${esc(s.git_branch)}</span>` : "";
  const ver = s.version ? `<span>v${esc(s.version)}</span>` : "";
  const readOnly = s.source === "desktop";
  const actBtn = s.archived
    ? `<button class="unarch" data-act="unarchive" data-id="${s.id}">${t.btnUnarchive}</button>`
    : `<button class="archive" data-act="archive" data-id="${s.id}">${t.btnArchive}</button>`;
  const actions = readOnly
    ? `<span class="ro">${t.readOnlyNote}</span>`
    : `${actBtn}
      <button class="danger" data-act="delete" data-id="${s.id}">${t.btnDelete}</button>`;
  const picked = selected.has(s.id);
  return `
  <div class="card${picked ? ' picked' : ''}">
    <div class="main">
      <div class="row1">
        <input type="checkbox" class="pick" data-id="${s.id}" ${picked ? 'checked' : ''} ${readOnly ? 'disabled' : ''}>
        <span class="ttl">${esc(s.title)}</span> ${badge} ${srcBadge} ${titleKind}
      </div>
      <div class="meta">
        <span>🕘 ${fmtDate(s.updated_at, s.mtime)}</span>
        <span class="cwd">📂 ${esc(shortCwd(s.cwd))}</span>
        ${branch}
        <span>${turns}</span>
        <span>${fmtSize(s.size)}</span>
        ${ver}
        <span class="id">${esc(s.id)}</span>
      </div>
      ${s.preview ? `<div class="preview">${esc(s.preview)}</div>` : ""}
    </div>
    <div class="actions">
      ${actions}
    </div>
  </div>`;
}

function confirmModal(title, bodyHTML) {
  return new Promise((resolve) => {
    $("#m-title").textContent = title;
    $("#m-body").innerHTML = bodyHTML;
    $("#overlay").classList.add("show");
    const ok = $("#m-ok"), cancel = $("#m-cancel");
    const done = (v) => {
      $("#overlay").classList.remove("show");
      ok.onclick = cancel.onclick = null;
      resolve(v);
    };
    ok.onclick = () => done(true);
    cancel.onclick = () => done(false);
  });
}

async function onAction(action, id) {
  const s = ALL.find((x) => x.id === id);
  const title = s ? s.title : id;

  if (action === "delete") {
    const runWarn = RUNNING ? t.deleteRunWarn : "";
    const ok = await confirmModal(t.deleteTitle, t.deleteBody(esc(title), runWarn));
    if (!ok) return;
  }

  const label = t.actionLabels[action];
  try {
    const r = await fetch("/api/action", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, id }),
    });
    const data = await r.json();
    if (data.ok) {
      toast(t.actionDone(label, title));
      await load();
    } else {
      toast(t.actionFailed(label, esc(errText(data))), true);
    }
  } catch (e) {
    toast(t.actionFailed(label, e.message), true);
  }
}

function toggleOne(id, on) {
  if (on) selected.add(id); else selected.delete(id);
  const cb = document.querySelector(`input.pick[data-id="${id}"]`);
  if (cb) cb.closest(".card").classList.toggle("picked", on);
  syncSelectionUI();
}

function toggleAllVisible(on) {
  filtered().forEach((s) => {
    if (s.source === "desktop") return; // 仅桌面端的条目不可操作，跳过
    on ? selected.add(s.id) : selected.delete(s.id);
  });
  render();
}

function syncSelectionUI() {
  const exist = new Set(ALL.map((s) => s.id));
  [...selected].forEach((id) => { if (!exist.has(id)) selected.delete(id); });

  const n = selected.size;
  $("#batchbar").classList.toggle("show", n > 0);
  $("#batch-count").textContent = t.selectedCount(n);

  const vis = filtered().filter((s) => s.source !== "desktop"); // 只统计可操作的
  const visSel = vis.filter((s) => selected.has(s.id)).length;
  const all = $("#selall");
  all.checked = vis.length > 0 && visSel === vis.length;
  all.indeterminate = visSel > 0 && visSel < vis.length;
}

async function onBatch(action) {
  const ids = [...selected];
  if (!ids.length) return;
  const label = t.actionLabels[action];

  if (action === "delete") {
    const runWarn = RUNNING ? t.batchRunWarn : "";
    const ok = await confirmModal(
      t.batchDeleteTitle(ids.length),
      t.batchDeleteBody(ids.length, runWarn)
    );
    if (!ok) return;
  }

  try {
    const r = await fetch("/api/action", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, ids }),
    });
    const data = await r.json();
    const okN = data.succeeded ?? (data.ok ? ids.length : 0);
    const failN = data.failed ?? (data.ok ? 0 : ids.length);
    if (failN === 0) toast(t.batchDone(label, okN));
    else toast(t.batchPartial(label, okN, failN), true);
  } catch (e) {
    toast(t.actionFailed(label, e.message), true);
  }
  selected.clear();
  await load();
}

$("#refresh").onclick = load;
$("#selall").addEventListener("change", (e) => toggleAllVisible(e.target.checked));
$("#batch-clear").onclick = () => { selected.clear(); render(); };
$("#batchbar").addEventListener("click", (e) => {
  const b = e.target.closest("[data-bact]");
  if (b) onBatch(b.dataset.bact);
});
$("#q").addEventListener("input", (e) => { query = e.target.value; render(); });
$("#proj").addEventListener("change", (e) => { projFilter = e.target.value; render(); });
$("#filters").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  filter = b.dataset.f;
  document.querySelectorAll("#filters button").forEach((x) => x.classList.toggle("active", x === b));
  render();
});
$("#srcfilters").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  srcFilter = b.dataset.sf;
  document.querySelectorAll("#srcfilters button").forEach((x) => x.classList.toggle("active", x === b));
  render();
});
$("#overlay").addEventListener("click", (e) => { if (e.target.id === "overlay") $("#overlay").classList.remove("show"); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") $("#overlay").classList.remove("show"); });

load();
</script>
</body>
</html>
