name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Audit, test, and package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          VERSION="$VERSION" make check test package installer
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          "dist/Chat-Session-Managers-v$VERSION-universal.zip"
          "dist/Chat-Session-Managers-Local-Installer-v$VERSION.zip"
          --repo "$GITHUB_REPOSITORY"
          --title "Chat Session Managers $VERSION"
          --notes-file "docs/release-notes-v$VERSION.md"
